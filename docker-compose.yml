services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: yourdockerhubusername/insurance-backend:latest
    container_name: insurance-backend
    ports:
      - "8000:8000"
    environment:
      - ADMIN_EMAILS=msp@haycarb.com

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    image: yourdockerhubusername/insurance-frontend:latest
    container_name: insurance-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
